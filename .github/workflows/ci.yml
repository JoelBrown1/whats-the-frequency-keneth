name: CI
on: [push, pull_request]
jobs:
  dart-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test --coverage
      - run: flutter analyze
      - run: flutter build macos --release
