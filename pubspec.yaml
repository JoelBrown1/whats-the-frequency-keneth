name: whats_the_frequency
description: "What's the Frequency, Kenneth — Guitar pickup resonance frequency analyser."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  fftea: ^1.3.0
  fl_chart: ^0.70.2
  package_info_plus: ^8.1.2
  synchronized: ^3.1.0+1
  uuid: ^4.5.0
  intl: ^0.20.2
  logger: ^2.4.0
  go_router: ^14.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  path_provider_platform_interface: any
  plugin_platform_interface: any

flutter:
  generate: true
  uses-material-design: true
